<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Seed Decision System</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    :root {
      --primary: #00ff88;
      --primary-hover: #00cc6a;
      --bg-dark: #0a0a0f;
      --glass-bg: rgba(15, 20, 25, 0.4);
      --glass-border: rgba(0, 255, 136, 0.2);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Outfit', sans-serif;
    }

    body {
      background: var(--bg-dark);
      background-image: radial-gradient(circle at 15% 50%, rgba(0, 255, 136, 0.08), transparent 25%),
                        radial-gradient(circle at 85% 30%, rgba(0, 200, 255, 0.05), transparent 25%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      color: white;
    }

    /* Animated Grid Background */
    .grid-bg {
      position: absolute;
      width: 200vw;
      height: 200vh;
      background-image: 
        linear-gradient(to right, rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 50px 50px;
      transform: perspective(500px) rotateX(60deg) translateY(-100px) translateZ(-200px);
      animation: gridMove 20s linear infinite;
      z-index: -1;
    }

    @keyframes gridMove {
      0% { transform: perspective(500px) rotateX(60deg) translateY(0) translateZ(-200px); }
      100% { transform: perspective(500px) rotateX(60deg) translateY(50px) translateZ(-200px); }
    }

    .login-container {
      width: 400px;
      padding: 50px 40px;
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5), inset 0 0 20px rgba(0,255,136,0.05);
      animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative;
    }

    @keyframes slideUp {
      0% { opacity: 0; transform: translateY(40px) scale(0.95); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    .logo-container {
      text-align: center;
      margin-bottom: 30px;
    }

    .fingerprint-icon {
      font-size: 50px;
      color: var(--primary);
      position: relative;
      display: inline-block;
      text-shadow: 0 0 20px rgba(0, 255, 136, 0.4);
    }

    .scanner-line {
      position: absolute;
      top: 0;
      left: -10%;
      width: 120%;
      height: 2px;
      background: var(--primary);
      box-shadow: 0 0 10px var(--primary), 0 0 20px var(--primary);
      animation: scan 2s ease-in-out infinite alternate;
      border-radius: 50%;
    }

    @keyframes scan {
      0% { top: -5px; opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { top: 55px; opacity: 0; }
    }

    h2 {
      text-align: center;
      font-size: 28px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 5px;
      background: linear-gradient(135deg, #fff, #aaa);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    p.subtitle {
      text-align: center;
      color: #888;
      font-size: 14px;
      margin-bottom: 40px;
    }

    /* Floating Label Input */
    .input-group {
      position: relative;
      margin-bottom: 30px;
    }

    .input-group i {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: #888;
      transition: 0.3s;
    }

    input {
      width: 100%;
      padding: 16px 20px 16px 45px;
      background: rgba(0,0,0,0.2);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      color: white;
      font-size: 16px;
      outline: none;
      transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 15px rgba(0,255,136,0.2);
      background: rgba(0,0,0,0.4);
    }

    input:focus + i, input:not(:placeholder-shown) + i {
      color: var(--primary);
    }

    /* Modern Button */
    button {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--primary), #00b35f);
      border: none;
      border-radius: 12px;
      color: #000;
      font-size: 16px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: 0.3s;
      box-shadow: 0 10px 20px rgba(0,255,136,0.2);
    }

    button:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 25px rgba(0,255,136,0.4);
    }

    button:active {
      transform: translateY(1px);
    }

    button::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
      transition: 0.5s;
    }

    button:hover::before {
      left: 100%;
    }

    #errorMsg {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
      min-height: 20px;
      color: #ff4757;
      font-weight: 600;
      letter-spacing: 0.5px;
      opacity: 0;
      transform: translateY(-10px);
      transition: 0.3s;
    }
    
    #errorMsg.show {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>
<body>

<div class="grid-bg"></div>

<div class="login-container">
  <div class="logo-container">
    <div class="fingerprint-icon">
      <i class="fa-solid fa-fingerprint"></i>
      <div class="scanner-line"></div>
    </div>
  </div>
  
  <h2>Apomiseed</h2>
  <p class="subtitle">Secure Farmer Access Portal</p>

  <div class="input-group">
    <input type="text" id="aadhaar" placeholder="12-Digit Aadhaar Number" maxlength="12" autocomplete="off">
    <i class="fa-regular fa-id-card"></i>
  </div>
  
  <button onclick="login()"><i class="fa-solid fa-lock-open" style="margin-right: 8px;"></i> Authenticate</button>
  
  <div id="errorMsg"></div>
</div>

<script>
  function showMessage(msg, color) {
    const errorMsg = document.getElementById('errorMsg');
    errorMsg.innerText = msg;
    errorMsg.style.color = color;
    errorMsg.classList.add('show');
  }

  function login() {
    const aadhaar = document.getElementById('aadhaar').value;
    const btn = document.querySelector('button');

    if (!/^\d{12}$/.test(aadhaar)) {
      showMessage('Invalid Aadhaar format.', '#ff4757');
      return;
    }

    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin" style="margin-right:8px;"></i> Verifying...';
    btn.style.opacity = '0.8';
    showMessage('Establishing secure connection...', '#aaa');

    fetch('http://localhost:3000/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ aadhaar })
    })
    .then(res => res.json())
    .then(data => {
        if (data.isNewUser) {
            showMessage('Registered successfully. Routing...', 'var(--primary)');
        } else {
            showMessage('Authentication valid. Routing...', 'var(--primary)');
        }
        
        btn.innerHTML = '<i class="fa-solid fa-check" style="margin-right:8px;"></i> Approved';
        btn.style.background = 'var(--primary)';
        
        sessionStorage.setItem('isLoggedIn', 'true');
        sessionStorage.setItem('aadhaar', aadhaar);
        
        setTimeout(() => {
          document.querySelector('.login-container').style.opacity = '0';
          document.querySelector('.login-container').style.transform = 'scale(0.9)';
          setTimeout(() => window.location.href = 'index.html', 400);
        }, 800);
    })
    .catch(err => {
        showMessage('Connection error. Is the server running?', '#ff4757');
        btn.innerHTML = '<i class="fa-solid fa-rotate-right" style="margin-right: 8px;"></i> Retry';
        btn.style.opacity = '1';
        console.error(err);
    });
  }
</script>

</body>
</html>
